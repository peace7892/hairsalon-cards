<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>헤어원네스트 | 헤어 노트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f0e8;color:#1a1a1a;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(160deg,#5c3d2e 0%,#3d2519 100%);color:#fff;padding:36px 24px 24px;text-align:center}
.header-logo{font-size:28px;margin-bottom:6px}
.header-salon{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:14px}
.milestone{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);padding:3px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:14px}
.header-name{font-size:26px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
.header-meta{font-size:13px;color:rgba(255,255,255,.55)}

/* HERO PHOTO */
.hero-wrap{margin:20px -24px -24px;border-radius:0 0 20px 20px;overflow:hidden}
.hero-img{width:100%;max-height:340px;object-fit:cover;object-position:top;display:block}

/* CONTAINER */
.container{max-width:640px;margin:0 auto;padding:16px 16px 40px}

/* CARDS */
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.card-title{font-size:12px;font-weight:700;color:#aaa;margin-bottom:16px;display:flex;align-items:center;gap:6px;letter-spacing:.5px;text-transform:uppercase}
.card-title .icon{font-size:14px}

/* DESIGNER NOTE */
.note-card{background:linear-gradient(135deg,#fdf8f4,#f5ede4);border:1.5px solid #e8d5c0;border-radius:16px;padding:22px;margin-bottom:14px}
.note-quote{font-size:32px;color:#d4a574;line-height:.8;margin-bottom:10px;font-family:Georgia,serif}
.note-text{font-size:15px;color:#3d2519;line-height:1.75;font-weight:500}
.note-from{font-size:12px;color:#a07850;margin-top:12px;font-weight:700;letter-spacing:.3px}

/* TAGS */
.tag{display:inline-block;background:#f0e8df;color:#8b5e3c;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-right:4px;margin-bottom:4px}

/* HOME CARE */
.warn-box{background:#fffbf0;border:2px solid #f5d87a;border-radius:12px;padding:14px 16px;font-size:14px;color:#92400e;line-height:1.7;margin-bottom:14px;font-weight:500}
.guide-item{margin-bottom:14px}
.guide-item:last-child{margin-bottom:0}
.guide-item label{font-size:12px;font-weight:700;color:#aaa;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.guide-item p{font-size:14px;color:#1a1a1a;line-height:1.65}

/* NEXT VISIT */
.next-card{background:linear-gradient(135deg,#f5ede4,#ede0d4);border-radius:16px;padding:20px;margin-bottom:14px;border:1.5px solid #d4b89a}
.next-date-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.next-date{font-size:22px;font-weight:800;color:#3d2519}
.dday-badge{background:#5c3d2e;color:#fff;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}
.next-info label{font-size:12px;font-weight:700;color:#a07850;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.next-info p{font-size:14px;color:#3d2519;line-height:1.55;margin-bottom:10px}

/* TODAY / HISTORY */
.tl-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f5f5f5}
.tl-item:last-child{border-bottom:none}
.tl-date{font-size:12px;color:#bbb;width:52px;flex-shrink:0;padding-top:3px;line-height:1.5}
.tl-body strong{font-size:13px;font-weight:700;color:#1a1a1a;display:block;margin-bottom:4px}
.tl-body span{font-size:13px;color:#777;line-height:1.55;display:block}
.tl-photo{max-width:100%;max-height:200px;border-radius:10px;margin-top:8px;object-fit:cover;display:block}

/* PROFILE GRID */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pitem label{font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
.pitem p{font-size:14px;color:#1a1a1a;line-height:1.5}

/* BOOKING */
.booking-btn{display:block;background:linear-gradient(135deg,#5c3d2e,#3d2519);color:#fff;text-align:center;padding:17px;border-radius:14px;font-size:15px;font-weight:700;text-decoration:none;margin-bottom:14px;letter-spacing:.3px;box-shadow:0 4px 16px rgba(92,61,46,.3)}

/* FOOTER */
.footer{text-align:center;padding:20px 16px 8px;color:#bbb;font-size:12px;line-height:1.9;border-top:1px solid #ede9e5;margin-top:4px}

.loading{text-align:center;padding:80px 20px;color:#bbb;font-size:14px}
.error{text-align:center;padding:80px 20px;color:#e57373;font-size:14px;line-height:1.8}

@media(max-width:480px){.pgrid{grid-template-columns:1fr}.header-name{font-size:22px}}
</style>
</head>
<body>
<div id="content"><div class="loading">불러오는 중...</div></div>

<script>
const OWNER='peace7892',REPO='hairsalon-cards',PATH='data/customers.json';
const BOOKING_URL='https://naver.me/xcA1QQgl';

async function load(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){show('<div class="error">잘못된 링크입니다</div>');return;}
  try{
    const r=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,{headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok)throw new Error();
    const d=await r.json();
    const customers=JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))))).customers||[];
    const c=customers.find(x=>x.id===id);
    if(!c){show('<div class="error">고객 정보를 찾을 수 없습니다</div>');return;}
    render(c);
  }catch(e){show('<div class="error">잠시 후 다시 시도해 주세요 🙏</div>');}
}

function render(c){
  const visits=(c.visits||[]).slice().reverse();
  const latest=visits[0]||null;
  const older=visits.slice(1);
  document.title=`${c.name}님의 헤어 노트 | 헤어원네스트`;

  show(`
    <div class="header">
      <div class="header-logo">🌿</div>
      <div class="header-salon">Hair Onenest</div>
      ${c.visitCount?`<div><span class="milestone">${milestone(c.visitCount)}</span></div>`:''}
      <div class="header-name">${c.name}님의 헤어 노트</div>
      <div class="header-meta">${c.lastVisit?`최근 방문 ${fmt(c.lastVisit)}`:''}${c.visitCount?` &nbsp;·&nbsp; 총 ${c.visitCount}회`:''}</div>
      ${latest?.photo?`<div class="hero-wrap"><img class="hero-img" src="${latest.photo}" alt="시술 사진"></div>`:''}
    </div>

    <div class="container">

      ${(latest?.note||latest?.detail)?`
      <div class="note-card">
        <div class="note-quote">"</div>
        <div class="note-text">${linkify(latest.note||latest.detail)}</div>
        <div class="note-from">— 헤어원네스트</div>
      </div>`:''}

      ${(c.warn||c.styling||c.products)?`
      <div class="card">
        <div class="card-title"><span class="icon">🏠</span>홈케어 가이드</div>
        ${c.warn?`<div class="warn-box">⚠️ &nbsp;${linkify(c.warn)}</div>`:''}
        ${c.styling?`<div class="guide-item"><label>손질 방법</label><p>${linkify(c.styling)}</p></div>`:''}
        ${c.products?`<div class="guide-item"><label>추천 제품</label><p>${linkify(c.products)}</p></div>`:''}
      </div>`:''}

      ${(c.suggest||c.nextVisit)?`
      <div class="next-card">
        <div class="card-title"><span class="icon">✂️</span>다음 방문 제안</div>
        ${c.nextVisit?`<div class="next-date-row"><span class="next-date">${fmt(c.nextVisit)}</span><span class="dday-badge">${dday(c.nextVisit)}</span></div>`:''}
        <div class="next-info">
          ${c.suggest?`<div><label>추천 시술</label><p>${linkify(c.suggest)}</p></div>`:''}
          ${c.cycle?`<div><label>방문 주기</label><p>${c.cycle}</p></div>`:''}
          ${c.suggestReason?`<div><label>이유</label><p>${linkify(c.suggestReason)}</p></div>`:''}
        </div>
      </div>`:''}

      ${latest?`
      <div class="card">
        <div class="card-title"><span class="icon">📋</span>오늘의 시술</div>
        <div style="margin-bottom:10px">${(latest.services||[]).map(s=>`<span class="tag">${s}</span>`).join('')||'<span class="tag">방문</span>'}</div>
        ${(latest.detail&&latest.detail!==latest.note)?`<p style="font-size:14px;color:#555;line-height:1.65;margin-bottom:10px">${linkify(latest.detail)}</p>`:''}
        ${latest.photo?`<img src="${latest.photo}" style="max-width:100%;border-radius:12px;object-fit:cover">` :''}
      </div>`:''}

      ${older.length?`
      <div class="card">
        <div class="card-title"><span class="icon">🗂</span>방문 이력</div>
        ${older.map(v=>`
          <div class="tl-item">
            <div class="tl-date">${fmt(v.date)}</div>
            <div class="tl-body">
              <strong>${(v.services||[]).map(s=>`<span class="tag" style="font-size:11px;padding:2px 8px">${s}</span>`).join('')||'방문'}</strong>
              ${v.detail?`<span>${linkify(v.detail)}</span>`:''}
              ${v.photo?`<img class="tl-photo" src="${v.photo}">`:''}
            </div>
          </div>`).join('')}
      </div>`:''}

      ${(c.headShape||c.faceShape||c.hairTexture||c.hairType||c.routine)?`
      <div class="card">
        <div class="card-title"><span class="icon">✨</span>내 헤어 프로필</div>
        <div class="pgrid">
          ${c.hairType?`<div class="pitem" style="grid-column:1/-1;margin-bottom:8px"><label>타입</label><p style="font-size:20px;font-weight:800;color:#8b5e3c;letter-spacing:.3px">${c.hairType}</p></div>`:''}
          ${c.headShape?`<div class="pitem"><label>두상</label><p>${c.headShape}</p></div>`:''}
          ${c.faceShape?`<div class="pitem"><label>얼굴형</label><p>${c.faceShape}</p></div>`:''}
          ${c.hairTexture?`<div class="pitem"><label>모질</label><p>${c.hairTexture}</p></div>`:''}
          ${c.routine?`<div class="pitem"><label>평소 홈케어</label><p>${c.routine}</p></div>`:''}
        </div>
      </div>`:''}

      <a href="${BOOKING_URL}" class="booking-btn" target="_blank" rel="noopener">✂️ &nbsp;다음 방문 예약하기</a>

      <div class="footer">
        헤어원네스트<br>
        이 기록은 고객님만을 위해 작성되었습니다<br>
        <span style="font-size:11px;color:#ccc;margin-top:4px;display:block;line-height:1.7">
          본 헤어 노트는 고객님의 동의하에 헤어원네스트가 관리합니다.<br>링크는 고객님 본인만 열람해 주세요.
        </span>
      </div>
    </div>
  `);
}

function milestone(n){
  if(n>=20)return'✦ 헤어원네스트 패밀리';
  if(n>=10)return'✦ 10회 단골 고객';
  if(n>=5)return'✦ 5회 단골 고객';
  if(n>=3)return'✦ 3회 방문';
  return`총 ${n}회 방문`;
}

function dday(s){
  if(!s)return'';
  const today=new Date();today.setHours(0,0,0,0);
  const t=new Date(s+'T00:00:00');t.setHours(0,0,0,0);
  const d=Math.round((t-today)/(864e5));
  if(d===0)return'D-Day';
  return d>0?`D-${d}`:`D+${Math.abs(d)}`;
}

function linkify(text){
  if(!text)return'';
  return text.replace(/(https?:\/\/[^\s]+)/g,url=>`<a href="${url}" target="_blank" rel="noopener" style="color:#8b5e3c;text-decoration:underline;word-break:break-all">${url.includes('youtube')||url.includes('youtu.be')?'▶ 유튜브 영상 보기':url}</a>`);
}

function show(html){document.getElementById('content').innerHTML=html;}
function fmt(s){if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}

load();
</script>
</body>
</html>
